<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revi - Página inicial</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="./assets/styles/styles.css" />
    <link rel="stylesheet" href="./assets/styles/home.css" />
    <link rel="stylesheet" href="./assets/styles/fonts.css" />

    <script src="./assets/scripts/home.js" defer></script>
  </head>
  <body>
    <div id="mockup">
      <main id="camera">
        <video id="camera-preview" autoplay muted playsinline></video>
        <div id="camera-erro" class="camera-erro" hidden>
          <p>Não foi possível acessar a câmera.</p>
          <p class="camera-erro-detalhe"></p>
        </div>
        <footer>
          <button id="galeria" type="button">
            <img
              id="galeria-thumb"
              src="./assets/images/preview_camera.png"
              alt=""
            />
          </button>
          <button id="capturar" type="button"></button>
          <button id="flash" type="button">
            <i class="fa-solid fa-bolt"></i>
          </button>
        </footer>
      </main>
      <footer>
        <a href="./home.html">
          <i class="fa-solid fa-house"></i>
          <span>Início</span>
        </a>
        <a href="./pastas.html">
          <i class="fa-solid fa-folder"></i>
          <span>Pastas</span>
        </a>
      </footer>

      <section id="selecao-imagem">
        <header>
          <div>
            <a href="./home.html"><i class="fa-solid fa-chevron-left"></i></a>
          </div>
        </header>

        <footer>
          <a href="./conteudo.html">Selecionar imagem</a>
        </footer>
      </section>
    </div>
  </body>
</html>
