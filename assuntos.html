<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revi - Assuntos</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="/assets/styles/styles.css" />
    <link rel="stylesheet" href="/assets/styles/assuntos.css" />
    <link rel="stylesheet" href="/assets/styles/fonts.css" />

    <script src="./assets/scripts/script.js" defer></script>
    <script src="./assets/scripts/assuntos.js" defer></script>
  </head>
  <body>
    <div id="mockup">
      <header>
        <div>
          <a href="/pastas.html">
            <i class="fa-solid fa-chevron-left"></i>
          </a>
          <input type="search" placeholder="Pesquisar" id="pesquisa" />
          <h1 id="assunto"></h1>
        </div>
        <label for="pesquisa">
          <i class="fa-solid fa-magnifying-glass"></i>
        </label>
      </header>
      <main id="assuntos"></main>

      <button id="fab">
        <i class="fa-solid fa-plus"></i>
      </button>

      <dialog id="adicionar-assunto" class="modal">
        <form>
          <button id="fechar" type="button">
            <i class="fa-solid fa-xmark"></i>
          </button>
          <i class="fa-solid fa-folder-plus"></i>
          <label>Nome do assunto:</label>
          <input type="text" placeholder="Equação, Redação..." />
          <button type="submit">Salvar assunto</button>
        </form>
      </dialog>
    </div>
  </body>
</html>
