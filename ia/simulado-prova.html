<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revi - Simulado de prova</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="../assets/styles/styles.css" />
    <link rel="stylesheet" href="../assets/styles/simulado-prova.css" />
    <link rel="stylesheet" href="../assets/styles/fonts.css" />

    <script src="../assets/scripts/script.js" defer></script>
    <script src="../assets/scripts/simulado-prova.js" defer></script>
  </head>
  <body>
    <div id="mockup">
      <header>
        <div>
          <a href="../conteudo.html">
            <i class="fa-solid fa-chevron-left"></i>
          </a>
          <h1>Simulado de prova</h1>
        </div>
      </header>
      <form id="simulado">
        <progress id="progresso-simulado" value="0" max="100"></progress>
        <span id="indice-pergunta"></span>
        <h2 id="texto-pergunta"></h2>
        <ul id="lista-alternativas"></ul>

        <button type="submit" id="btn-proxima">
          <i class="fa-solid fa-chevron-right"></i>
          <span>Próxima pergunta</span>
        </button>
      </form>
    </div>
  </body>
</html>
