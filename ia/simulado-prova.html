<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revi - Simulado de prova</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="../assets/styles/styles.css" />
    <link rel="stylesheet" href="../assets/styles/simulado-prova.css" />
    <link rel="stylesheet" href="../assets/styles/fonts.css" />

    <script src="../assets/scripts/script.js" defer></script>
  </head>
  <body>
    <div id="mockup">
      <header>
        <div>
          <a href="../conteudo.html">
            <i class="fa-solid fa-chevron-left"></i>
          </a>
          <h1>Simulado de prova</h1>
        </div>
      </header>
      <form id="simulado">
        <progress value="30" max="100"></progress>
        <span>Pergunta 03 de 10</span>
        <h2>Qual é a forma geral de uma equação do terceiro grau?</h2>
        <ul>
          <li>
            <label>
              <strong>A.</strong> ax³ + bx² + cx + d = 0
              <input type="radio" name="pergunta" value="A" required>
            </label>

          </li>
          <li>
            <label>
              <strong>B.</strong> ax² + bx + c = 0
              <input type="radio" name="pergunta" value="B" required>
            </label>

          </li>
          <li>
            <label>
              <strong>C.</strong> ax + b = 0
              <input type="radio" name="pergunta" value="C" required>
            </label>

          </li>
          <li>
            <label>
              <strong>D.</strong> ax³ + bx² + cx + d = 0
              <input type="radio" name="pergunta" value="D" required>
            </label>

          </li>
        </ul>

        <button type="submit">
          <i class="fa-solid fa-chevron-right"></i>
          <span>Próxima pergunta</span>
        </button>
      </for>
    </div>
  </body>
</html>
