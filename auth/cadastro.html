<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revi - Criar conta</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="../assets/styles/styles.css" />
    <link rel="stylesheet" href="../assets/styles/auth.css" />
    <link rel="stylesheet" href="../assets/styles/fonts.css" />

    <script src="../assets/scripts/script.js" defer></script>
    <script src="../assets/scripts/cadastro.js" defer></script>
  </head>
  <body>
    <div id="mockup">
      <header class="login-brand">
        <img src="../assets/images/logo.svg" alt="Revi" />
        <h1>Criar conta</h1>
        <p>Preencha os dados para começar a estudar com o Revi.</p>
      </header>

      <main class="login-main">
        <form id="cadastro-form">
          <label for="nome">Nome</label>
          <div class="login-field">
            <i class="fa-solid fa-user" aria-hidden="true"></i>
            <input
              id="nome"
              name="nome"
              type="text"
              autocomplete="name"
              placeholder="Seu nome"
              required
              minlength="2"
            />
          </div>

          <label for="email">E-mail</label>
          <div class="login-field">
            <i class="fa-solid fa-envelope" aria-hidden="true"></i>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              inputmode="email"
              placeholder="seu@email.com"
              required
            />
          </div>

          <label for="senha">Senha</label>
          <div class="login-field">
            <i class="fa-solid fa-lock" aria-hidden="true"></i>
            <input
              id="senha"
              name="senha"
              type="password"
              autocomplete="new-password"
              placeholder="••••••••"
              required
              minlength="8"
            />
            <button
              type="button"
              class="login-toggle-senha"
              aria-label="Mostrar ou ocultar senha"
            >
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <label for="confirmar-senha">Confirmar senha</label>
          <div class="login-field">
            <i class="fa-solid fa-lock" aria-hidden="true"></i>
            <input
              id="confirmar-senha"
              name="confirmar-senha"
              type="password"
              autocomplete="new-password"
              placeholder="••••••••"
              required
              minlength="6"
            />
            <button
              type="button"
              class="login-toggle-senha"
              aria-label="Mostrar ou ocultar confirmação de senha"
            >
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>

          <label class="login-termos">
            <input type="checkbox" name="termos" required />
            <span
              >Li e aceito os termos de uso e a política de privacidade.</span
            >
          </label>

          <button type="submit" class="login-submit">
            Criar conta
            <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
          </button>
        </form>

        <p class="login-footer">
          Já tem conta?
          <a href="./login.html" class="login-link">Entrar</a>
        </p>
      </main>
    </div>
  </body>
</html>
